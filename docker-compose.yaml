version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ip-geo-app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./data:/data:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ip-geo-redis
    restart: unless-stopped
